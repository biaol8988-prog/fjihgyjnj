<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Myth Universe</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="header">
    <h1>AI Myth Universe</h1>
    <p id="subtitle">AI Myth Universe · Dynamic Archive System</p>
    
    <div style="margin-top:10px;">
      <button id="langToggle">中文 / EN</button>
      <button id="mapToggle">Map / World</button>
    </div>

    <div style="margin-top:10px;">
      <input id="searchBox" type="text" placeholder="Search..." style="padding:8px;width:80%;max-width:300px;border-radius:6px;border:none;" />
    </div>
  </header>

  <main>
    <section class="grid" id="grid">
      <!-- world view -->
    </section>

    <section class="grid" id="mapView" style="display:none">
      <!-- map view -->
    </section>
  </main>

  <footer>
    <p id="footerText">Powered by AI Myth Universe Engine</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
